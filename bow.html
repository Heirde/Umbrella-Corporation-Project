<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="bow.css">
    <title>Black Market</title>
</head>

<body>

    <div class="content">
    <nav>
        <img src="assets/images/Umbrella_Corporation_logo.svg.png" alt="Umbrella Corporation Logo" class="logo">
        <p class="logo-headline">UMBRELLA CORPORATION</p>
        <a href="index.html" class="nav-button">Home</a>
        <a href="about.html" class="nav-button">About Us</a>
        <a href="research.html" class="nav-button">Research & Development</a>
        <a href="products.html" class="nav-button">Products</a>

        <div class="profile-wrapper">
            <button class="profile-btn">
                <div class="profile-avatar" id="profileAvatar">?</div>
                <span class="profile-name" id="profileName">Guest</span>
                <span class="profile-chevron">›</span>
            </button>
            <div class="profile-dropdown" id="profileDropdown">

                <div id="loggedInSection">
                    <div class="user-info">
                        <span id="userRole">guest</span>
                        <span id="userClearance">Clearance Level 1</span>
                    </div>
                    <hr>
                    <a href="#">My Account</a>
                    <a href="#">Security Clearance</a>
                    <a href="#">Settings</a>
                    <a href="bow.html" id="bowLink" style="display:none; color: #ff6b6b;">⬛ B.O.W. Portal</a>
                    <a href="admin.html" id="adminLink" style="display:none; color: #ffaa00;">⚙ Admin Panel</a>
                    <hr>
                    <a href="#" class="signout">Sign Out</a>
                </div>

                <div id="loggedOutSection">
                    <div class="dropdown-login">

                        <div id="signInForm">
                            <p class="dropdown-login-title">Sign In</p>
                            <input type="text" id="dropdownFirstName" placeholder="First name">
                            <input type="text" id="dropdownLastName" placeholder="Last name">
                            <input type="password" id="dropdownPassword" placeholder="Password">
                            <button class="dropdown-login-btn" id="dropdownLoginBtn">Sign In</button>
                            <p class="dropdown-toggle-text">No account? 
                                <span id="showSignUp">Register</span>
                            </p>
                        </div>

                        <div id="signUpForm" style="display: none;">
                            <p class="dropdown-login-title">Create Account</p>
                            <input type="text" id="signUpFirstName" placeholder="First name">
                            <input type="text" id="signUpLastName" placeholder="Last name">
                            <input type="password" id="signUpPassword" placeholder="Password">
                            <button class="dropdown-login-btn" id="dropdownSignUpBtn">Create Account</button>
                            <p class="dropdown-toggle-text">Have an account? 
                                <span id="showSignIn">Sign In</span>
                            </p>
                        </div>

                    </div>
</div>
</div>
    </nav>

</head>
<body>
    <div class="logo">
    </div>
    <h1 class="title"></h1>
    <div id="terminal">
    <div id="output"></div>
    <div class="input-line">

    <span>> </span>
    <input type="text" id="input" autofocus />
    </div>
    </div>

    </div>

    <script src="terminal.js" defer></script>
    <script src="nav.js"></script>
    <script src="bow.js"></script>

</body>
</html>
